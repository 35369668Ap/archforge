#!/usr/sbin/nft -f
# arch-rice — desktop profile: stateful, allow all outbound, drop unsolicited inbound

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;
    ct state established,related accept
    ct state invalid drop
    iif lo accept
    ip protocol icmp accept
    ip6 nexthdr icmpv6 accept
    # Source: aur-wiki-nftables.txt — "Limit rate" section:
    # "tcp dport ssh ct state new limit rate 15/minute accept" — Avoid brute force on SSH
    tcp dport ssh ct state new limit rate 15/minute accept comment "Avoid brute force on SSH"
    # Source: aur-wiki-nftables.txt — "Logging traffic":
    # "You can log packets using the log action."
    log prefix "nftables-drop: " flags all drop
  }
  chain forward {
    type filter hook forward priority 0; policy drop;
  }
  chain output {
    type filter hook output priority 0; policy accept;
  }
}
