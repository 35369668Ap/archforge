#!/usr/sbin/nft -f
# arch-rice — strict profile: drop all, explicit whitelist only
# WARNING: You must add rules manually before applying, or you will lose connectivity.

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;
    ct state established,related accept
    iif lo accept
  }
  chain forward {
    type filter hook forward priority 0; policy drop;
  }
  chain output {
    type filter hook output priority 0; policy drop;
    ct state established,related accept
    oif lo accept
  }
}
